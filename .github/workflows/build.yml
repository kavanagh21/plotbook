name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ".[stats]"

      - name: Build executable
        run: |
          pyinstaller --name PlotBook --windowed --onedir ^
            --add-data "resources;resources" ^
            --hidden-import plotbook.rendering.series_renderers ^
            --hidden-import plotbook.models.table_formats ^
            src/plotbook/__main__.py
        shell: cmd

      - name: Create Windows installer (NSIS)
        run: |
          choco install nsis -y
          Copy-Item installer/windows.nsi dist/PlotBook/installer.nsi
          cd dist/PlotBook
          makensis installer.nsi
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PlotBook-Windows-Installer
          path: dist/PlotBook/PlotBook-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ".[stats]"

      - name: Build app bundle
        run: |
          pyinstaller --name PlotBook --windowed --onedir \
            --add-data "resources:resources" \
            --hidden-import plotbook.rendering.series_renderers \
            --hidden-import plotbook.models.table_formats \
            --osx-bundle-identifier com.plotbook.app \
            src/plotbook/__main__.py

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -r dist/PlotBook.app dmg_contents/ 2>/dev/null || cp -r dist/PlotBook dmg_contents/PlotBook.app
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "PlotBook" -srcfolder dmg_contents \
            -ov -format UDZO PlotBook.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PlotBook-macOS-DMG
          path: PlotBook.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: PlotBook-Windows-Installer
          path: artifacts/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: PlotBook-macOS-DMG
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## PlotBook ${{ github.ref_name }}

            Publication-quality graph editor for scientists.

            ### Downloads

            | Platform | Download | Instructions |
            |----------|----------|--------------|
            | **Windows** | `PlotBook-Setup.exe` | Run the installer, launch from Start Menu |
            | **macOS** | `PlotBook.dmg` | Open DMG, drag PlotBook to Applications |
            | **From source** | See below | `pip install plotbook` |

            ### Install from source (any platform)
            ```bash
            pip install "plotbook[stats]"
            python -m plotbook
            ```
          files: |
            artifacts/PlotBook-Setup.exe
            artifacts/PlotBook.dmg
