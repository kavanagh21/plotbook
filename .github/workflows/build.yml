name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ".[stats]"

      - name: Build executable
        run: |
          pyinstaller --name PlotBook --windowed --onedir ^
            --add-data "resources;resources" ^
            --hidden-import plotbook.rendering.series_renderers ^
            --hidden-import plotbook.models.table_formats ^
            src/plotbook/__main__.py
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlotBook-Windows
          path: dist/PlotBook/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ".[stats]"

      - name: Build app bundle
        run: |
          pyinstaller --name PlotBook --windowed --onedir \
            --add-data "resources:resources" \
            --hidden-import plotbook.rendering.series_renderers \
            --hidden-import plotbook.models.table_formats \
            src/plotbook/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlotBook-macOS
          path: dist/PlotBook/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: PlotBook-Windows
          path: PlotBook-Windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: PlotBook-macOS
          path: PlotBook-macOS

      - name: Zip artifacts
        run: |
          cd PlotBook-Windows && zip -r ../PlotBook-Windows.zip . && cd ..
          cd PlotBook-macOS && zip -r ../PlotBook-macOS.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## PlotBook ${{ github.ref_name }}

            Publication-quality graph editor for scientists.

            ### Downloads
            - **Windows**: `PlotBook-Windows.zip` — extract and run `PlotBook.exe`
            - **macOS**: `PlotBook-macOS.zip` — extract and run `PlotBook`

            ### Install from source
            ```bash
            pip install "plotbook[stats]"
            python -m plotbook
            ```
          files: |
            PlotBook-Windows.zip
            PlotBook-macOS.zip
